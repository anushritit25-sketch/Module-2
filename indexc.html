<!DOCTYPE html>
<html lang="en">
<head>
    <title>Skyline Properties</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <h1 id="logo">Skyline Properties</h1>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Properties</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- HERO SECTION -->
    <header class="hero">
        <h1>Find Your Dream Home</h1>
        <p style="color: rgb(255, 0, 208);">Best Deals on Flats, Villas and Apartments</p>
    </header>

    <!-- FILTER SECTION -->
    <section class="filter-box">
        <h1>Filter Properties</h1>
        <select>
            <option>Price Range</option>
            <option>₹20L - ₹50L</option>
            <option>₹50L - ₹1Cr</option>
        </select>

        <select>
            <option>BHK Type</option>
            <option>1 BHK</option>
            <option>2 BHK</option>
            <option>3 BHK</option>
        </select>
    </section>

    <!-- PROPERTY CARDS -->
    <section class="property-container">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1507089947368-19c1da9775ae" alt="Property">
            <h3>Luxury Apartment</h3>
            <p>2 BHK | Nagpur | ₹45 Lakhs</p>
            <button>View Details</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2" alt="Property">
            <h3>Modern Villa</h3>
            <p>3 BHK | Pune | ₹95 Lakhs</p>
            <button>View Details</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1570129477492-45c003edd2be" alt="Property">
            <h3>Premium Flat</h3>
            <p>1 BHK | Mumbai | ₹60 Lakhs</p>
            <button>View Details</button>
        </div>

    </section>

</body>
</html>
